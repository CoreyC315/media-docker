# media-docker — a single-box media server stack
#
# Services: gluetun (VPN) -> qbittorrent, prowlarr, sonarr, radarr, jellyfin
#
# Quick start:
#   1. cp .env.example .env   and fill it in
#   2. mkdir -p the DATA_ROOT folders (see README)
#   3. docker compose up -d
#
# Everything app-related lives under ./config/<app> (bind mounts) so it is
# easy to back up — just tar the config/ directory.

services:
  # ---------------------------------------------------------------------------
  # gluetun — VPN gateway. qBittorrent routes ALL its traffic through this
  # container, so if the tunnel drops, torrent traffic stops (kill switch).
  # ---------------------------------------------------------------------------
  gluetun:
    image: qmcgaw/gluetun:v3.41.0
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # qBittorrent WebUI is published HERE, not on the qbittorrent service,
      # because qbittorrent shares gluetun's network namespace.
      - "8080:8080"
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      # ProtonVPN WireGuard private key — from a config you generate in the
      # Proton dashboard (downloads -> WireGuard). Set in .env.
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES:-United States}
      # --- Port forwarding (so torrents actually seed) ---
      VPN_PORT_FORWARDING: "on"
      VPN_PORT_FORWARDING_PROVIDER: protonvpn
      # When Proton hands out a new forwarded port, push it into qBittorrent.
      VPN_PORT_FORWARDING_UP_COMMAND: >-
        /bin/sh -c 'wget -qO- --post-data "json={\"listen_port\":{{PORT}}}" http://localhost:8080/api/v2/app/setPreferences'
      HTTP_CONTROL_SERVER_ADDRESS: ":8000"
      # Userspace WireGuard behind Proton NAT goes silent a few minutes after
      # the handshake unless we keep the NAT mapping warm. 25s does it.
      WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL: 25s
      TZ: ${TZ:-America/Detroit}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # qBittorrent — download client, network-locked to gluetun.
  # Access the WebUI at http://<vm-ip>:8080
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls446
    container_name: qbittorrent
    # Share gluetun's network stack — this is the VPN kill switch.
    network_mode: "service:gluetun"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
      WEBUI_PORT: "8080"
    volumes:
      - ./config/qbittorrent:/config
      - ${DATA_ROOT}:/data
    depends_on:
      - gluetun
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prowlarr — indexer manager. Feeds indexers to Sonarr/Radarr.
  # WebUI: http://<vm-ip>:9696
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls144
    container_name: prowlarr
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
    ports:
      - "9696:9696"
    volumes:
      - ./config/prowlarr:/config
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Sonarr — TV. WebUI: http://<vm-ip>:8989
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls309
    container_name: sonarr
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
    ports:
      - "8989:8989"
    volumes:
      - ./config/sonarr:/config
      - ${DATA_ROOT}:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Radarr — Movies. WebUI: http://<vm-ip>:7878
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls300
    container_name: radarr
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
    ports:
      - "7878:7878"
    volumes:
      - ./config/radarr:/config
      - ${DATA_ROOT}:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jellyfin — media server / player. WebUI: http://<vm-ip>:8096
  #
  # Hardware transcoding is OFF by default for portability. If the VM has an
  # Intel/AMD iGPU passed through, uncomment the `devices` block below and turn
  # on VAAPI in Jellyfin (Dashboard -> Playback).
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:10.11.8
    container_name: jellyfin
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
    ports:
      - "8096:8096"
    volumes:
      - ./config/jellyfin:/config
      - ${DATA_ROOT}:/data
    # devices:
    #   - /dev/dri:/dev/dri   # uncomment for VAAPI/QSV hardware transcoding
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jellyseerr — media request portal (the Jellyfin-native fork of Overseerr;
  # Overseerr proper only supports Plex). Users browse and request titles here;
  # it hands approved requests to Sonarr/Radarr. WebUI: http://<vm-ip>:5055
  # ---------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:2.7.3
    container_name: jellyseerr
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Detroit}
    ports:
      - "5055:5055"
    volumes:
      - ./config/jellyseerr:/app/config
    restart: unless-stopped
